<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Pen</title>
  <style>
    html,
    textarea {
      font-family: monospace;
      background: #012;
      color: #def;
    }

    textarea {
      background: #123;
      width: 99%;
      height: 82vh;
    }

    a {
      color: aqua;
    }

    #run {
      position: absolute;
      margin: 0;
      right: 1em;
      top: 1em;
    }
  </style>
</head>

<body>
  <p>
    <button id="deleteBtn">🗑️</button>
    <input id="urlInp" type="text" value="./" list="urlList" />
    <datalist id="urlList"></datalist>
    <button id="saveBtn">💾 Save</button> |
    <a id="urlLink" accesskey="r" href="">👟 Run</a>
  </p>
  <p>
    <textarea id="bodyInp" autofocus spellcheck=false cols=80 rows=20></textarea>
  </p>
  <script>
    let url, list = []

    async function load() {
      document.getElementById("urlLink").href = document.getElementById("urlInp").value
      url = document.getElementById("urlLink").href
      //document.getElementById("urlLink").textContent = url
      document.getElementById("urlInp").value = url
      document.getElementById("urlInp").style.width = document.getElementById("urlInp").scrollWidth + "px"

      fetch(url).then(resp => {
        resp.text().then(text => {
          document.getElementById("bodyInp").value = text
        })
      })
      if (url.slice(-1) == "/") {
        let entries = await ls(url)
        for (let entry of entries) {
          entry = url + entry
          if (entry && !list.includes(entry)) {
            list.push(entry)
            let opt = document.createElement("option")
            opt.value = entry
            document.getElementById("urlList").appendChild(opt)
          }
        }
      }
    }

    async function ls(url) {
      let resp = await fetch(url)
      let text = await resp.text()
      let doc = Document.parseHTML(text)

      let base = doc.createElement("base")
      base.href = resp.url
      doc.head.prepend(base)

      let links = doc.querySelectorAll("[src], [href]")
      let entries = []
      for (let link of links) {
        entry = link.href || link.src
        if (entry.includes(resp.url)) {
          entry = entry.replace(resp.url, "")
          if (entry.includes("/")) {
            entry = entry.split("/")[0] + "/"
          }
          if (entry && !entries.includes(entry)) entries.push(entry)
        }
      }
      return entries.sort()
    }

    document.getElementById("urlInp").addEventListener("change", load)
    document.getElementById("deleteBtn").addEventListener("click", e => {
      if (!confirm(`Delete ${url} ?`)) return
      fetch(url, { method: "delete" }).then(resp => {
        resp.text().then(text => {
          document.getElementById("bodyInp").value = text
        })
      })
    })
    document.getElementById("saveBtn").addEventListener("click", e => {
      fetch(url, { method: "put", body: document.getElementById("bodyInp").value }).then(resp => {
        if (!resp?.ok) resp.text().then(alert)
      })
    })

    load()
    navigator.serviceWorker.register("./sw.js", { scope: "./" })
  </script>
  <script>
    const codeEditor = document.getElementById("bodyInp")
    let selectedTxt = ""
    let dictionary = []
    let codeLength = 0

    function init() {
      updateDictionary()
      document.getElementById("bodyInp").addEventListener("keyup", () => {
        selectedTxt = codeEditor.value.substring(codeEditor.selectionStart, codeEditor.selectionEnd)
      })
      document.getElementById("bodyInp").addEventListener("mouseup", (e) => {
        selectedTxt = codeEditor.value.substring(codeEditor.selectionStart, codeEditor.selectionEnd)
      })
      document.getElementById("bodyInp").addEventListener("keydown", (e) => {
        if (e.key === "Tab" && !e.ctrlKey) e.preventDefault()
        setTimeout(() => {
          codeEditor.focus()
          switch (e.key) {
            case "Backspace":
            case "Delete":
              selectedTxt = ""
              break
            case "Tab":
              if (e.ctrlKey) return
              if (selectedTxt) insert(selectedTxt)
              else insert(detectIndent())
              break
            case "Enter":
              let lastLine = codeEditor.value.substring(0, codeEditor.selectionStart).trim().split("\n").pop()
              insert(lastLine.substring(0, lastLine.indexOf(lastLine.trim())))
              break

            case "\"":
            case "'":
              if (codeEditor.value.substr(codeEditor.selectionEnd, 1) === e.key) {
                codeEditor.selectionEnd++
                insert("")
              } else {
                insert("", selectedTxt, e.key)
              }
              break
            case "(":
              insert("", selectedTxt, ")")
              break
            case "[":
              insert("", selectedTxt, "]")
              break
            case "{":
              insert("", selectedTxt, "}")
              break

            case ")":
            case "]":
            case "}":
              if (codeEditor.value.substr(codeEditor.selectionEnd, 1) === e.key) {
                codeEditor.selectionEnd++
                insert("")
              }
              break

            default:
              if (e.key.length === 1) {
                if (e.key.match(/[_A-Za-z0-9]/)) suggest()
                else updateDictionary()
              }
          }
        })
      }
      )
    }

    function detectIndent() {
      let code = codeEditor.value.trim().split("\n")
      for (let i = 0; i < code.length; i++) {
        const line = code[i]
        if (line.trim() && line.substring(0, line.indexOf(line.trim()))) {
          return line.substring(0, line.indexOf(line.trim()))
        }
      }
      return "\t"
    }
    function suggest() {
      if (codeEditor.value[codeEditor.selectionEnd].match(/[_A-Za-z0-9]/)) return
      let pos = codeEditor.selectionStart
      let code = codeEditor.value.substring(0, pos).split("\n").pop()
      let word = ""
      for (let i = 0; i < code.length; i++) {
        const char = code[i]
        if (char.match(/[_A-Za-z]/) || (word && char.match(/[0-9]/))) {
          word += char
        } else {
          word = ""
        }
      }
      if (!word) return
      for (let i = 0; i < dictionary.length; i++) {
        const entry = dictionary[i]
        if (entry.substring(0, word.length) === word) {
          insert("", entry.substring(word.length))
          dictionary.splice(i, 1)
          dictionary.unshift(entry)
          return
        }
      }
    }
    function updateDictionary() {
      let words = []
      let code = codeEditor.value + "\n"
      let word = ""
      for (let i = 0; i < code.length; i++) {
        const char = code[i]
        if (char.match(/[_A-Za-z]/) || (word && char.match(/[0-9]/))) {
          word += char
        } else if (word) {
          if (words.indexOf(word) < 0) words.push(word)
          if (dictionary.indexOf(word) < 0) dictionary.push(word)
          word = ""
        }
      }
      for (let i = 0; i < dictionary.length; i++) {
        const word = dictionary[i]
        if (words.indexOf(word) < 0) {
          dictionary.splice(i, 1)
        }
      }
    }
    function insert(before = "", selected = "", after = "") {
      let start = codeEditor.selectionStart
      let end = codeEditor.selectionEnd
      codeEditor.value = codeEditor.value.substring(0, start) + before + selected + after + codeEditor.value.substring(end)
      codeEditor.selectionStart = start + before.length
      codeEditor.selectionEnd = codeEditor.selectionStart + selected.length
    }
    setTimeout(init)
  </script>
</body>

</html>
